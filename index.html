<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Midnight Vow by Shivam</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,900;1,400&family=Montserrat:wght@300;400;700&display=swap');

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .cover-container {
            width: 90%;
            max-width: 500px;
            background-color: #0b0b0d;
            border: 1px solid #27272a;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.15), 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
            text-align: center;
        }

        .cover-image {
            width: 100%;
            height: 350px;
            background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1470&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Adds a dark gradient over the image so text stands out */
        .cover-image::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(11, 11, 13, 0) 0%, rgba(11, 11, 13, 1) 100%);
        }

        .cover-content {
            padding: 0 40px 50px 40px;
            position: relative;
            z-index: 2;
            margin-top: -60px;
        }

        .series-title {
            color: #ff0055;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }

        .book-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin: 0 0 20px 0;
            letter-spacing: 1px;
        }

        .author-name {
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #a0a0aa;
            margin-bottom: 40px;
        }

        .author-name span {
            color: #ffffff;
            font-weight: 700;
        }

        .start-btn {
            display: inline-block;
            padding: 15px 40px;
            background-color: transparent;
            color: #ff0055;
            border: 2px solid #ff0055;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            background-color: #ff0055;
            color: #050505;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="cover-container">
        <div class="cover-image"></div>
        <div class="cover-content">
            <div class="series-title">Book One of the Crescent Chronicles</div>
            <h1 class="book-title">The Midnight Vow</h1>
            <div class="author-name">A Novel by <span>Shivam</span></div>
            
            <a href="chapter1.html" class="start-btn">Begin the Initiation</a>
        </div>
    </div>

</body>
</html>
